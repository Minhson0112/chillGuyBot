services:
  bot:
    build: .
    container_name: chill-guy-bot
    env_file: .env
    depends_on:
      - mysql
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/__pycache__

  game-api:
    build: ./activity/api
    container_name: chill-guy-game-api
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: chill_station
      DB_USER: root
      DB_PASSWORD: root
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
    depends_on:
      - mysql
    restart: unless-stopped

  game-web:
    build:
      context: ./activity/game
      args:
        VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    container_name: chill-guy-game-web
    depends_on:
      - game-api
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./activity/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: chill-guy-cloudflared
    command: tunnel --no-autoupdate --url http://game-web:80
    depends_on:
      - game-web
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: chill-guy-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chill_station
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
