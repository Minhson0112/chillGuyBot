services:
  bot:
    build: .
    container_name: chill-guy-bot
    env_file: .env
    depends_on:
      - mysql
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/__pycache__

  mysql:
    image: mysql:8.0
    container_name: chill-guy-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chill_station
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
